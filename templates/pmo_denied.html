<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - PMO Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="/static/css/brand-theme.css" rel="stylesheet">
    <link href="/static/css/dark-theme.css" rel="stylesheet">
    <script src="/static/js/theme-toggle.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-teal-50 min-h-screen flex items-center justify-center px-4">
    <div class="section-card bg-white rounded-2xl shadow-lg p-10 max-w-lg text-center">
        <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-lock text-red-500 text-2xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Access Denied</h1>
        <p class="text-gray-600 mb-4">Ye PMO Portal sirf authorized admins ke liye hai.</p>
        {% if email %}
        <p class="text-sm text-gray-500 mb-6">Aapka email: <b>{{ email }}</b><br>
           Ise access dene ke liye <code>PMO_ADMINS</code> list me add karwao.</p>
        {% endif %}
        <a href="{{ url_for('dashboard') }}" class="inline-flex items-center bg-teal-600 text-white px-6 py-3 rounded-xl font-semibold shadow hover:opacity-90">
            <i class="fas fa-arrow-left mr-2"></i>Back to Dashboard
        </a>
    </div>
</body>
</html>
