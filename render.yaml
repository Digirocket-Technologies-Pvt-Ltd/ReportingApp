services:
  - type: web
    name: reporting-app
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # gthread worker + threads: the single worker can still answer Render's
    # health checks while one thread is busy generating a PDF (a plain sync
    # worker blocks completely -> Render marks it unhealthy -> 502).
    # --max-requests recycles the worker periodically so image-rendering memory
    # never piles up and OOM-kills the 512 MB free-tier box.
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 1 --worker-class gthread --threads 4 --max-requests 150 --max-requests-jitter 30
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: CLIENT_ID
        sync: false
      - key: CLIENT_SECRET
        sync: false
      - key: REDIRECT_URI
        sync: false
      - key: KIMI_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: PMO_ADMINS
        sync: false
